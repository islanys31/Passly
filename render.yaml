services:
  - type: web
    name: passly-api
    runtime: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PORT
        value: "20701"
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://passly3106.vercel.app
      - key: NODE_ENV
        value: production
