server {
    listen 80;
    server_name localhost passly.com www.passly.com;

    # Desafío de Let's Encrypt (Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 1. Servir archivos estáticos del frontend (Permitido en HTTP para localhost)
    location / {
        # Si NO es localhost, redirigir a HTTPS (Hardening para producción)
        # if ($host != "localhost") {
        #    return 301 https://$host$request_uri;
        # }
        
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy para la API (Disponible en HTTP para desarrollo/localhost)
    location /api {
        proxy_pass http://api:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Proxy para Socket.IO
    location /socket.io {
        proxy_pass http://api:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

