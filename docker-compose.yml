version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: passly-db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-passly}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_USER: ${DB_USER:-passly_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-passly_password}
    ports:
      - "3307:3306"
    volumes:
      - ./database/passly.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    networks:
      - passly-network

  api:
    build: ./backend
    container_name: passly-api
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=${DB_ROOT_PASSWORD:-root_password}
      - DB_NAME=${DB_NAME:-passly}
      - JWT_SECRET=${JWT_SECRET:-bbf6c6f51f38bece9f5be29a2af97227c22fa3eba506e1fd9862ad727}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
      - EMAIL_USER=${EMAIL_USER:-catira3132@mail.com}
      - EMAIL_PASS=${EMAIL_PASS}
    depends_on:
      - db
    networks:
      - passly-network

  nginx:
    image: nginx:alpine
    container_name: passly-web
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - passly-network

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: passly-tunnel
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    networks:
      - passly-network

networks:
  passly-network:
    driver: bridge

volumes:
  mysql_data:
