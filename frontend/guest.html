<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passly - Tu Invitación</title>
    <link rel="stylesheet" href="/css/index.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: var(--bg-primary);
            overflow: hidden;
            font-family: var(--font-primary);
        }

        /* Ambient Dynamic Background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 10% 10%, hsla(150, 70%, 45%, 0.15) 0%, transparent 45%),
                radial-gradient(circle at 90% 90%, hsla(220, 90%, 65%, 0.15) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, hsla(280, 50%, 60%, 0.1) 0%, transparent 60%);
            filter: blur(80px);
            z-index: -2;
            animation: bgPulse 15s infinite alternate ease-in-out;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes bgPulse {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.05) translate(-2%, 2%); }
        }

        .invitation-card {
            background: rgba(26, 32, 44, 0.6);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            padding: 48px;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 32px 64px -16px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            max-width: 90%;
            width: 480px;
            animation: contentReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        /* Border Glow */
        .invitation-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 33px;
            background: linear-gradient(135deg, hsla(150, 70%, 45%, 0.5), transparent 40%, hsla(220, 90%, 65%, 0.5));
            z-index: -1;
            opacity: 0.5;
            pointer-events: none;
        }

        .logo-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .logo-icon-small {
            width: 44px;
            height: 44px;
            background: hsla(150, 70%, 45%, 0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-primary);
            box-shadow: 0 0 15px var(--accent-glow);
            border: 1px solid hsla(150, 70%, 45%, 0.2);
        }

        .status-badge {
            background: linear-gradient(135deg, hsla(150, 70%, 45%, 0.15), hsla(150, 70%, 45%, 0.05));
            border: 1px solid hsla(150, 70%, 45%, 0.3);
            color: var(--accent-primary);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            margin: 0 auto 24px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
            box-shadow: 0 8px 16px hsla(150, 70%, 45%, 0.1);
        }

        .status-badge i {
            width: 14px;
            height: 14px;
        }

        h1 {
            color: var(--text-primary);
            margin-bottom: 12px;
            font-size: 32px;
            font-family: var(--font-secondary);
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        #guestMsg {
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 15px;
            line-height: 1.5;
            font-weight: 400;
        }

        #qr-wrapper {
            margin: 0 auto 32px;
            background: white;
            padding: 24px;
            border-radius: 24px;
            display: inline-block;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            position: relative;
            transform: scale(1);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #qr-wrapper:hover {
            transform: scale(1.02);
        }

        /* Decorative QR Corners */
        #qr-wrapper::before, #qr-wrapper::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border: 3px solid var(--accent-primary);
            border-radius: 8px;
            pointer-events: none;
        }
        #qr-wrapper::before { top: -10px; left: -10px; border-right: none; border-bottom: none; }
        #qr-wrapper::after { bottom: -10px; right: -10px; border-left: none; border-top: none; }

        #expiryMsg {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: hsla(0, 0%, 100%, 0.03);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            width: max-content;
            margin: 0 auto;
        }

        .footer-note {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .footer-note p {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            margin: 0;
        }

        @keyframes contentReveal {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>

<body class="auth-page">
    <div class="invitation-card" id="cardContainer">
        <!-- Contenido Inyectado por JS -->
    </div>

    <script>
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function (c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                return null;
            }
        }
        
        const token = new URLSearchParams(window.location.search).get('token');
        const container = document.getElementById('cardContainer');

        if (token) {
            const decoded = parseJwt(token);
            if (decoded) {
                let expStr = "";
                if (decoded.exp) {
                    const date = new Date(decoded.exp * 1000);
                    expStr = `<i data-lucide="clock"></i> Expira: ${date.toLocaleDateString()} a las ${date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
                }

                container.innerHTML = `
                    <div class="logo-header">
                        <div class="logo-icon-small"><i data-lucide="shield-check"></i></div>
                        <span>Passly.</span>
                    </div>

                    <div class="status-badge">
                        <i data-lucide="check-circle-2"></i> Acceso Seguro
                    </div>
                    
                    <h1>¡Hola, <span>${decoded.guestName.split(' ')[0]}</span>!</h1>
                    <p id="guestMsg">Esta es tu llave digital de entrada. Por favor, tenla a la mano cuando llegues a las instalaciones.</p>

                    <div id="qr-wrapper">
                        <canvas id="qrcode"></canvas>
                    </div>

                    <div id="expiryMsg">${expStr}</div>

                    <div class="footer-note">
                        <i data-lucide="scan-line" style="color:var(--text-muted); width:18px;"></i>
                        <p>PRESENTA ESTE CÓDIGO EN EL ESCÁNER</p>
                    </div>
                `;

                if (window.lucide) window.lucide.createIcons();

                if (typeof QRCode !== 'undefined') {
                    // Esperar un tick para que el canvas exista en el DOM
                    setTimeout(() => {
                        QRCode.toCanvas(document.getElementById('qrcode'), token, {
                            width: 240,
                            margin: 0,
                            color: {
                                dark: '#111827',
                                light: '#ffffff'
                            }
                        }, function (error) {
                            if (error) {
                                console.error(error);
                                document.getElementById('qr-wrapper').innerHTML = `<div style="color:var(--error-color); padding: 40px;"><i data-lucide="alert-triangle" style="width:40px; height:40px; margin-bottom:10px;"></i><br>Error al generar QR</div>`;
                                if (window.lucide) window.lucide.createIcons();
                            }
                        });
                    }, 50);
                } else {
                    document.getElementById('qr-wrapper').innerHTML = "<p style='padding:40px; color:var(--text-muted);'>Cargando llave...</p>";
                    setTimeout(() => location.reload(), 2000);
                }

            } else {
                showError("Token de invitación inválido o corrupto.", "shield-alert");
            }
        } else {
            showError("No se encontró el código de invitación en la URL.", "link-2-off");
        }

        function showError(msg, icon) {
            container.innerHTML = `
                <div class="logo-header">
                    <div class="logo-icon-small" style="color:var(--error-color); background:rgba(239, 68, 68, 0.1); border-color:rgba(239, 68, 68, 0.2); box-shadow:0 0 15px rgba(239, 68, 68, 0.2);">
                        <i data-lucide="shield-alert"></i>
                    </div>
                    <span>Passly.</span>
                </div>
                <div style="margin: 40px 0;">
                    <i data-lucide="${icon}" style="width:64px; height:64px; color:var(--error-color); opacity:0.8; margin-bottom:20px;"></i>
                    <h1 style="color:var(--text-primary); font-size:24px;">Acceso Denegado</h1>
                    <p style="color:var(--text-secondary); max-width:300px; margin:0 auto; line-height:1.6;">${msg}</p>
                </div>
                <a href="/" class="status-badge" style="text-decoration:none; color:var(--text-primary); background:var(--bg-secondary); border-color:var(--glass-border); padding:12px 24px;">
                    Volver a Seguridad
                </a>
            `;
            if (window.lucide) window.lucide.createIcons();
        }
    </script>
</body>
</html>
