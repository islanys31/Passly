<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passly Pro - Panel de Control</title>
    
    <!-- Rutas relativas para funcionamiento dentro de subcarpeta frontend/ -->
    <link rel="stylesheet" href="css/index.css?v=15">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="src/js/dashboard_main.js?v=15"></script>
    
    <style>
        #sidebar-logo-container { cursor: pointer; transition: transform 0.3s ease; position: relative; }
        #sidebar-logo-container:hover { transform: scale(1.05); }
        .client-logo-img { max-width: 100%; max-height: 40px; object-fit: contain; }
    </style>
</head>

<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div id="sidebar-logo-container">
              <h1 id="sidebar-logo">PASSLY</h1>
              <input type="file" id="client-logo-input" accept="image/*" style="display:none;">
          </div>
          <button id="toggleSidebar" class="btn-icon">☰</button>
        </div>
      </div>
      <nav class="nav-menu" id="nav-menu"></nav>
      <div class="sidebar-footer">
        <div class="theme-toggle" id="themeToggle">
          <span class="theme-toggle-icon" id="themeIcon">🌙</span>
          <span class="theme-toggle-text">MODO NOCHE</span>
        </div>
        <div class="nav-item logout-btn" id="logout-btn" style="margin-top:20px; color:var(--error)">
          <i>🚪</i> <span class="nav-text">Cerrar Sesión</span>
        </div>
      </div>
    </aside>

    <main class="main-view">
      <header class="top-bar">
        <div class="header-left"><h2 id="view-title">Vista General</h2></div>
        <div class="header-right" style="display:flex; align-items:center; gap:24px;">
          <div class="user-profile" id="profile-trigger">
            <div class="user-avatar" id="userInitial">P</div>
            <div id="userName" style="font-size:14px; font-weight:700;">Analizando...</div>
          </div>
        </div>
      </header>
      <div id="view-content" style="animation: contentReveal 0.6s ease-out;"></div>
    </main>
  </div>
</body>
</html>
