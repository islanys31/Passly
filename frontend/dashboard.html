<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passly - Panel de Control Administrativo</title>
  <link rel="stylesheet" href="/css/index.css">
  <link rel="manifest" href="/manifest.json">
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.28/dist/jspdf.plugin.autotable.min.js"></script>
  <script type="module" src="/js/dashboard.js"></script>
</head>

<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <h1 id="sidebar-logo">Passly</h1>
          <button id="toggleSidebar" class="btn-icon" title="Colapsar menú">☰</button>
        </div>
      </div>
      <nav class="nav-menu">
        <div class="nav-item"><i>📊</i> <span class="nav-text">Inicio</span></div>
        <div class="nav-item"><i>👥</i> <span class="nav-text">Usuarios</span></div>
        <div class="nav-item"><i>📱</i> <span class="nav-text">Dispositivos</span></div>
        <div class="nav-item"><i>🚗</i> <span class="nav-text">Transportes</span></div>
        <div class="nav-item"><i>🚪</i> <span class="nav-text">Accesos</span></div>
        <div id="navAudit" class="nav-item"><i>📋</i> <span class="nav-text">Auditoría</span></div>
        <div id="navSecurity" class="nav-item"><i>🛡️</i> <span class="nav-text">Seguridad</span></div>
      </nav>
      <div class="sidebar-footer">
        <div class="theme-toggle" id="themeToggle"
          style="margin-bottom:10px; position:relative; top:0; right:0; width:100%; border-radius:12px;">
          <span class="theme-toggle-icon" id="themeIcon">🌙</span>
          <span class="theme-toggle-text" id="themeText">Modo Claro</span>
        </div>
        <div class="nav-item" style="color:var(--error-color)"><i>🚪</i> <span class="nav-text">Salir</span></div>
      </div>
    </aside>

    <main class="main-view">
      <div class="top-bar">
        <h2 id="view-title">Resumen</h2>
        <div style="display:flex; align-items:center; gap:20px;">
          <div class="user-profile">
            <div class="user-avatar" id="userInitial">-</div>
            <div style="text-align:left;">
              <div id="userName" style="font-size:14px; font-weight:600; color:var(--text-primary);">Cargando...</div>
              <div id="userRole" style="font-size:11px; color:var(--text-muted);">...</div>
            </div>
          </div>
        </div>
      </div>
      <div id="view-content"></div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
      <h2 id="modalTitle" style="margin-bottom:20px;">Acción</h2>
      <div id="modalBody"></div>
      <div style="display:flex; gap:10px; margin-top:20px;">
        <button class="btn-table" style="flex:1" onclick="closeModal()">Cancelar</button>
        <button id="btnSave" style="flex:1; margin-top:0">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    // Detector de errores global para el dashboard
    window.onerror = function (msg, url, line, col, error) {
      const content = document.getElementById('view-content');
      if (content) {
        content.innerHTML = `
          <div class="card" style="max-width: 600px; margin: 40px auto; border-left: 5px solid var(--error-color); text-align: left;">
            <h3 style="color: var(--error-color); margin-bottom: 10px;">🛑 Error de Inicialización</h3>
            <p style="font-size: 14px; color: var(--text-secondary); margin-bottom: 15px;">
              El panel no pudo cargar correctamente debido a un error técnico.
            </p>
            <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; overflow-x: auto;">
              <strong>Error:</strong> ${msg}<br>
              <strong>Archivo:</strong> ${url.split('/').pop()}<br>
              <strong>Línea:</strong> ${line}:${col}
            </div>
            <button onclick="location.reload()" style="margin-top: 20px; background: var(--accent-blue);">Reintentar Carga</button>
          </div>
        `;
      }
      return false;
    };
  </script>
</body>

</html>
