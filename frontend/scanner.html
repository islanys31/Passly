<!-- 
    ESTRUCTURA DE ESTUDIO: SCANNER.HTML
    Este archivo es el "Terminal de Campo" para el personal de seguridad.
    
    [CONCEPTO CLAVE: LECTURA QR]
    Utiliza la cámara del dispositivo para decodificar códigos QR generados por los residentes.
    Es una herramienta crítica porque valida la identidad en tiempo real contra el backend.
    
    Funcionalidades clave:
    1. Acceso a hardware (Cámara) mediante 'Html5Qrcode'.
    2. Comunicación segura con la API para validar el escaneo.
    3. Feedback visual inmediato (Éxito/Error).
-->
<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passly - Escáner QR</title>
    
    <!-- Estilos base compartidos con el resto del sistema -->
    <link rel="stylesheet" href="/css/index.css">
    
    <!-- Librería especializada en lectura de QR desde el navegador (Vía CDN) -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>

<body style="background: var(--bg-primary); overflow-y: auto;">
    <div style="max-width: 600px; margin: 0 auto; padding: 40px 20px; min-height: 100vh; display: flex; flex-direction: column;">
        
        <!-- ENCABEZADO: Título y Contexto -->
        <div style="text-align: center; margin-bottom: 20px;">
            <h1 style="background: linear-gradient(135deg, var(--accent-green), var(--accent-blue)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-size: 32px; margin-bottom: 10px;">
                🔍 Escáner Passly
            </h1>
            <p style="color: var(--text-muted); font-size: 14px;">Apunta la cámara al código QR del usuario</p>
        </div>

        <div class="card" style="flex: 1; display: flex; flex-direction: column; padding: 20px;">
            <!-- ELEMENTO LECTOR: Aquí es donde la librería 'inyecta' el flujo de video de la cámara -->
            <div id="reader" style="width: 100%; max-width: 500px; margin: 0 auto; border-radius: 12px; overflow: hidden;"></div>

            <!-- PANEL DE RESULTADOS (Oculto por defecto) -->
            <div id="result" style="margin-top: 20px; text-align: center; display: none;">
                <div id="userPhoto"
                    style="width: 120px; height: 120px; margin: 0 auto 15px; border-radius: 50%; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; font-size: 48px; border: 4px solid var(--accent-green); overflow: hidden;">
                    👤
                </div>
                <h2 id="userName" style="color: var(--accent-green); margin-bottom: 5px;">-</h2>
                <p id="userType" style="color: var(--text-muted); font-size: 14px; margin-bottom: 5px;">-</p>
                <p id="accessTime" style="color: var(--text-primary); font-size: 15px; margin-bottom: 20px; font-weight: 600;">-</p>
                <div class="badge badge-success" style="font-size: 16px; padding: 10px 20px;">✓ Acceso Autorizado</div>
            </div>

            <!-- MENSAJES DE ERROR (Oculto por defecto) -->
            <div id="error"
                style="margin-top: 20px; padding: 15px; background: rgba(239,68,68,0.1); border: 2px solid var(--error-color); border-radius: 12px; display: none; text-align: center;">
                <p style="color: var(--error-color); font-weight: 600; margin: 0;" id="errorMsg">Error</p>
            </div>
        </div>

        <!-- CONTROLES DE NAVEGACIÓN -->
        <div style="display: flex; flex-direction: column; gap: 16px; margin-top: 32px;">
            <button id="btnReset" class="btn-primary" onclick="resetScanner()" style="display: none;">
                REINICIAR ESCÁNER
            </button>
            <button class="btn-auth" onclick="location.href='dashboard.html'" style="background: transparent; border: 1px solid var(--glass-border); color: var(--text-primary); box-shadow: none;">
                VOLVER AL PANEL DE CONTROL
            </button>
        </div>
    </div>

    <!-- LÓGICA DE CONTROL DEL ESCÁNER -->
    <script type="module">
        import { apiRequest } from '/js/api.js';
        import { showToast } from '/js/utils.js';

        let html5QrCode;
        const resultDiv = document.getElementById('result');
        const errorDiv = document.getElementById('error');
        const resetBtn = document.getElementById('btnReset');

        /**
         * Función que se ejecuta cuando la librería detecta exitosamente un QR.
         */
        function onScanSuccess(decodedText, decodedResult) {
            // Detenemos la cámara tras un éxito para liberar recursos del hardware
            html5QrCode.stop().then(() => {
                processQR(decodedText);
            });
        }

        /**
         * [ESTUDIO: VALIDACIÓN DE ACCESO]
         * Enviamos los datos del QR al servidor (Backend). 
         * El servidor verifica si el código sigue siendo válido y si el usuario 
         * tiene los atributos necesarios para entrar.
         */
        async function processQR(scanData) {
            const res = await apiRequest('/accesos/scan', 'POST', { scanData });

            if (res.ok) {
                const data = res.data.data;
                document.getElementById('userName').textContent = data.nombre;
                document.getElementById('userType').textContent = data.esInvitado ? '🎫 Invitado Temporal' : '🔑 Usuario Permanente';
                
                const now = new Date();
                document.getElementById('accessTime').innerHTML = `🕒 ${now.toLocaleDateString()} - ${now.toLocaleTimeString()}`;

                const photoDiv = document.getElementById('userPhoto');
                if (data.foto) {
                    const photoUrl = data.foto.startsWith('http') ? data.foto : (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? data.foto : `https://passly-api.onrender.com${data.foto}`);
                    photoDiv.innerHTML = `<img src="${photoUrl}" style="width: 100%; height: 100%; object-fit: cover;">`;
                } else {
                    photoDiv.innerHTML = data.nombre.charAt(0).toUpperCase();
                    photoDiv.style.fontSize = '48px';
                    photoDiv.style.background = 'linear-gradient(135deg, var(--accent-green), var(--accent-blue))';
                    photoDiv.style.color = 'white';
                }

                resultDiv.style.display = 'block';
                resetBtn.style.display = 'block';
                showToast(`Acceso registrado: ${data.nombre}`, 'success');
            } else {
                // Si el backend rechaza el acceso (Ej: QR expirado o usuario bloqueado)
                errorDiv.style.display = 'block';
                document.getElementById('errorMsg').textContent = res.data?.error || 'QR inválido o expirado';
                resetBtn.style.display = 'block';
            }
        }

        /**
         * Limpia la interfaz y reinicia el motor de la cámara.
         */
        window.resetScanner = function () {
            resultDiv.style.display = 'none';
            errorDiv.style.display = 'none';
            resetBtn.style.display = 'none';
            startScanner();
        };

        /**
         * [ESTUDIO: CONFIGURACIÓN DE HARDWARE]
         * La cámara es un recurso delicado. Aquí configuramos:
         * - facingMode: "environment" -> Indica que use la cámara TRASERA (en móviles).
         * - fps: Cuántos cuadros por segundo analiza buscando un QR (15-20 es óptimo).
         * - qrbox: El cuadro visual de enfoque para el usuario.
         */
        async function startScanner() {
            if (typeof Html5Qrcode === 'undefined') {
                console.error('Libraría de Escaneo no detectada');
                errorDiv.style.display = 'block';
                document.getElementById('errorMsg').innerHTML = '⌛ Cargando motor de escaneo...';
                setTimeout(startScanner, 2000); // Reintento automático si falla la carga parcial
                return;
            }

            try {
                if (html5QrCode) await html5QrCode.stop().catch(() => { });
                html5QrCode = new Html5Qrcode("reader");

                await html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 15, qrbox: { width: 250, height: 250 } },
                    onScanSuccess
                );

                errorDiv.style.display = 'none';
                console.log('Cámara sincronizada correctamente');
            } catch (err) {
                console.error('Error al iniciar cámara:', err);
                errorDiv.style.display = 'block';
                let msg = 'No se pudo acceder a la cámara.';

                if (err.name === 'NotAllowedError') msg += ' Permiso denegado por el navegador.';
                else if (err.name === 'NotFoundError') msg += ' No se encontró hardware de cámara.';
                else if (location.protocol !== 'https:' && location.hostname !== 'localhost') msg += ' <br><strong>Error de Seguridad:</strong> Se requiere conexión cifrada (HTTPS) para el escaneo.';

                document.getElementById('errorMsg').innerHTML = msg + '<br><button onclick="location.reload()" style="background:var(--accent-blue); color:white; border:none; padding:5px 10px; border-radius:5px; margin-top:10px; cursor:pointer;">REINTENTAR</button>';
            }
        }

        // Retardo preventivo para asegurar que el DOM esté listo antes de arrancar la cámara
        setTimeout(startScanner, 1000);
    </script>
</body>
</html>
