<!-- 
    ESTRUCTURA DE ESTUDIO: INDEX.HTML (Sincronización Fail-Safe para Vercel)
    Esta copia asegura que la estética Pro cargue incluso si Vercel apunta a la subcarpeta.
-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passly - Control de Acceso Seguro</title>
    
    <!-- Rutas relativas para funcionamiento dentro de subcarpeta frontend/ -->
    <link rel="stylesheet" href="css/index.css?v=15">
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="js/auth.js?v=15"></script>
</head>

<body class="auth-page">
    <div class="ambient-bg">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
        <div class="glow-3"></div>
    </div>
    <div class="noise-overlay"></div>

    <nav class="landing-navbar">
        <div class="logo">
            <i data-lucide="shield-check" style="color:var(--accent-green)"></i>
            <span>Passly<span>.</span></span>
        </div>
        <ul class="nav-links">
            <li><a href="#inicio">Inicio</a></li>
            <li><a href="#funciones">Funciones</a></li>
            <li><a href="#nosotros">Nosotros</a></li>
            <li><a href="#contacto">Contacto</a></li>
        </ul>
        <div style="display:flex; gap:15px; align-items:center;">
            <button class="theme-toggle glass" id="themeToggle" style="position:static; width:40px; height:40px;">
                <i data-lucide="moon" id="themeIcon"></i>
            </button>
            <button class="btn-primary" id="btnNavLogin" style="padding:10px 25px;">Ingresar</button>
        </div>
    </nav>

    <header class="hero-section" id="inicio">
        <div class="hero-content animate-fade-in">
            <div class="premium-badge">Seguridad de Siguiente Nivel</div>
            <h1>Gestión de Acceso <span>Inteligente</span> y Segura</h1>
            <p>Passly transforma la seguridad de tu empresa con tecnología de vanguardia, QR dinámicos y control en tiempo real.</p>
            <div style="display:flex; gap:20px; justify-content:center;">
                <button class="btn-primary" id="btnHeroRegister" style="padding:18px 40px; font-size:18px;">Comenzar Ahora</button>
                <button class="glass" id="btnHeroLearnMore" style="padding:18px 40px; font-size:18px; border:1px solid var(--glass-border);">Saber Más</button>
            </div>
        </div>
    </header>

    <div class="modal-overlay" id="authOverlay" style="z-index:2000;">
        <div class="auth-container" id="authContainer" style="position:relative;">
            <button id="btnCloseAuth" style="position:absolute; top:-50px; right:0; background:transparent; border:none; color:white; font-size:30px; cursor:pointer;">&times;</button>
            <header class="auth-header animate-fade-in" style="margin-bottom:30px;">
                <div class="logo-icon glass"><i data-lucide="shield-check"></i></div>
                <h1>Passly<span>.</span></h1>
            </header>
            <div class="card glass-glow" id="loginCard">
                <h2 style="margin-bottom: 24px;">Iniciar Sesión</h2>
                <div class="input-group"><i data-lucide="mail"></i><input id="emailLogin" type="email" placeholder="Correo Corporativo"></div>
                <div class="input-group"><i data-lucide="lock"></i><input id="passLogin" type="password" placeholder="Contraseña"></div>
                <div class="input-group">
                    <i data-lucide="briefcase"></i>
                    <select id="rolLogin">
                        <option value="" disabled selected>Nivel de Autorización</option>
                        <option value="4">Super Admin (Global)</option>
                        <option value="1">Administrador</option>
                        <option value="2">Residente</option>
                        <option value="3">Seguridad</option>
                    </select>
                </div>
                <button id="btnLogin" class="btn-primary" style="width:100%;">ENTRAR AL SISTEMA</button>
            </div>
        </div>
    </div>
</body>
</html>
