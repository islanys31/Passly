<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passly Pro - Panel de Control</title>
    
    <!-- Estilos Originales (Wow Factor) -->
    <link rel="stylesheet" href="./frontend/css/index.css?v=16">
    <link rel="manifest" href="./frontend/manifest.json">
    
    <!-- Chart.js: Para dibujar las gráficas de estadísticas -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Lucide: Iconos vectoriales -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Lógica del Panel de Control Pro -->
    <script type="module" src="./frontend/src/js/dashboard_main.js?v=18"></script>
    
    <!-- Escudo Anti-Bucle Dashboard (Garantía de salida) -->
    <script>
        if (!localStorage.getItem('auth_token')) {
            window.location.href = "/?session_failed=true";
        }
    </script>
    
    <style>
        /* Ajuste para el logo interactivo solicitado por el usuario */
        #sidebar-logo-container {
            cursor: pointer;
            transition: transform 0.3s ease;
            position: relative;
        }
        #sidebar-logo-container:hover {
            transform: scale(1.05);
        }
        #sidebar-logo-container:hover::after {
            content: 'Cambiar Logo';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: var(--accent-secondary);
            font-weight: bold;
            white-space: nowrap;
        }
        .client-logo-img {
            max-width: 100%;
            max-height: 40px;
            object-fit: contain;
        }
    </style>
</head>

<body>
  <div class="dashboard-container">
    
    <!-- BARRA LATERAL (SIDEBAR): Navegación de Módulos -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <!-- Área del Logo del Cliente (Interactivo) -->
          <div id="sidebar-logo-container" title="Haz clic para subir tu logo">
              <h1 id="sidebar-logo">PASSLY</h1>
              <input type="file" id="client-logo-input" accept="image/*" style="display:none;">
          </div>
          <button id="toggleSidebar" class="btn-icon" title="Control de Menú">☰</button>
        </div>
      </div>
      
      <!-- Menú dinámico -->
      <nav class="nav-menu" id="nav-menu">
        <!-- Renderizado dinámicamente en dashboard_main.js -->
      </nav>

      <div class="sidebar-footer">
        <div class="theme-toggle" id="themeToggle">
          <span class="theme-toggle-icon" id="themeIcon">🌙</span>
          <span class="theme-toggle-text" id="themeText">MODO NOCHE</span>
        </div>
        <div class="nav-item logout-btn" id="logout-btn" style="margin-top:20px; color:var(--error)">
          <i>🚪</i> <span class="nav-text">Cerrar Sesión</span>
        </div>
      </div>
    </aside>

    <!-- ÁREA DE VISTA PRINCIPAL -->
    <main class="main-view">
      <header class="top-bar">
        <div class="header-left">
          <h2 id="view-title">Vista General del Panel</h2>
        </div>

        <div class="header-right" style="display:flex; align-items:center; gap:24px;">
          <div class="notification-container" style="position:relative; cursor:pointer;">
            <div class="btn-icon">🔔</div>
            <div id="notifBadge" style="display:none; position:absolute; top:-4px; right:-4px; background:var(--error); color:white; font-size:10px; font-weight:bold; border-radius:10px; padding:2px 6px; border:2px solid var(--bg-primary);">0</div>
          </div>

          <div class="user-profile" id="profile-trigger">
            <div class="user-avatar" id="userInitial">P</div>
            <div class="user-info" style="text-align:left; line-height:1.2;">
              <div id="userName" style="font-size:14px; font-weight:700; color:var(--text-primary);">Analizando...</div>
              <div id="userRole" style="font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px;">-</div>
            </div>
          </div>
        </div>
      </header>

      <!-- ÁMBER DINÁMICO RESTAURADO -->
      <div id="view-content" style="animation: contentReveal 0.6s ease-out;">
          <div style="display:flex; align-items:center; justify-content:center; height:100%;">
              <div class="loading-spinner"></div>
          </div>
      </div>
    </main>
  </div>

  <!-- SISTEMA DE VENTANAS MODALES -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
      <div class="modal-header" style="margin-bottom:32px;">
        <h2 id="modalTitle" style="font-size:24px; letter-spacing:-0.03em;">Acción</h2>
      </div>
      <div id="modalBody"></div>
      <div class="modal-footer" style="display:flex; gap:16px; margin-top:40px;">
        <button type="button" class="btn-primary" style="flex:1; background:hsla(0,0%,100%,0.05); color:var(--text-primary); box-shadow:none;" onclick="closeModal()">Cancelar</button>
        <button type="button" class="btn-primary" id="btnSave" style="flex:1;">Confirmar</button>
      </div>
    </div>
  </div>
</body>
</html>
